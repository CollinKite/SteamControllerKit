name: SteamControllerTester

options:
  bundleIdPrefix: com.collinkite
  deploymentTarget:
    iOS: "26.0"
    tvOS: "26.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.35.0"

packages:
  SteamControllerKit:
    path: ..

targets:
  SteamControllerTester:
    type: application
    supportedDestinations: [iOS, tvOS]
    sources:
      - SteamControllerTester
    dependencies:
      - package: SteamControllerKit
        product: SteamControllerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.collinkite.SteamControllerTester
        PRODUCT_NAME: SteamControllerTester
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        # Set your Apple Developer team in Xcode's Signing & Capabilities tab.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Connects to a Steam Controller over Bluetooth to read its inputs."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
